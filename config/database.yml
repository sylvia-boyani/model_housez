default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "password") %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: model_housez_development

test:
  <<: *default
  database: model_housez_test

production:
  <<: *default
  database: model_housez_production
  username: model_housez
  password: <%= ENV["MODEL_HOUSEZ_DATABASE_PASSWORD"] %>
